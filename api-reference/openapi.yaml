                type: string
                example: Accept, Origin
            X-Content-Type-Options:
              schema:
                type: string
                example: nosniff
            X-Frame-Options:
              schema:
                type: string
                example: DENY
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: number
                    example: 8
                  limit:
                    type: number
                    example: 100
                  max_limit:
                    type: number
                    example: 100
                  next:
                    nullable: true
                    example: null
                  offset:
                    type: number
                    example: 5
