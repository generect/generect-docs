      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company_search_criteria:
                  type: object
                  description: Company filters (same as /search/database/companies/).
                  properties:
                    industries:
                      type: array
                      items:
                        type: string
                    headcounts:
                      type: array
                      items:
                        type: string
                    locations:
                      type: array
                      items:
                        type: string
                    company_types:
                      type: array
                      items:
                        type: string
                lead_search_criteria:
                  type: object
                  description: Lead filters (same as /search/database/leads/).
                  properties:
                    job_titles:
                      type: array
                      items:
                        type: string
                    seniorities:
                      type: array
                      items:
                        type: string
                    locations:
                      type: array
                      items:
                        type: string
                    company_industries:
                      type: array
                      items:
                        type: string
                    company_headcounts:
                      type: array
                      items:
                        type: string
                    personas:
                      type: array
                      items:
                        type: array
                    limit_by:
                      type: integer
                    offset_by:
                      type: integer
            examples:
              Preview leads:
                value:
                  company_search_criteria:
                    industries:
                      - Software Development
                    headcounts:
                      - 51-200
                    locations:
                      - United States
                  lead_search_criteria:
                    job_titles:
                      - CEO
                      - Founder
                    seniorities:
                      - c_suite
                    locations:
                      - United States
                    limit_by: 25
