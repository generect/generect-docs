  /email/find/:
    post:
      tags:
        - 7. Email
      summary: Find email
      description: Find a verified work email by lead ID, LinkedIn URL, or by name and domain. Billed only when a valid email is found.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: By Lead ID
                  type: object
                  required:
                    - lead_id
                  properties:
                    lead_id:
                      type: string
                      description: Generect lead identifier from Search, Preview, or Enrich.
                      example: ACwAAAE9bk0BxY7Qf2mN4pR8sT1vW3zA5cE6gH9
                - title: By LinkedIn URL
                  type: object
                  required:
                    - linkedin_url
                  properties:
                    linkedin_url:
                      type: string
                      description: Lead's LinkedIn profile URL.
                      example: https://www.linkedin.com/in/jordan-ellis
                - title: By Name and Domain
                  type: object
                  required:
                    - first_name
                    - last_name
                    - domain
                  properties:
                    first_name:
                      type: string
                      description: Lead's first name.
                      example: John
                    last_name:
                      type: string
                      description: Lead's last name.
                      example: Doe
                    domain:
                      type: string
                      description: Company domain used to generate the email pattern.
                      example: microsoft.com
            examples:
              By Lead ID:
                value:
                  lead_id: ACwAAAE9bk0BxY7Qf2mN4pR8sT1vW3zA5cE6gH9
              By LinkedIn URL:
                value:
                  linkedin_url: https://www.linkedin.com/in/jordan-ellis
              By name and domain:
                value:
                  first_name: Jordan
                  last_name: Ellis
                  domain: microsoft.com
      responses:
        '400':
          description: Validation error or insufficient balance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Validation error:
                  value:
                    status: error
                    status_code: 400
                    detail: {"non_field_errors": ["Provide one of: lead_id, linkedin_url, or first_name+last_name+domain."]}
                Insufficient funds:
                  value:
                    status: error
                    status_code: 400
                    detail: Insufficient funds in the account.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '200':
          description: Email result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailFindResponse'
              examples:
                Found:
                  value:
                    data:
                      lead_id: ACwAAAE9bk0BxY7Qf2mN4pR8sT1vW3zA5cE6gH9
                      email:
                        address: jordan.ellis@microsoft.com
                        status: VALID
                        confidence: 0.95
                        type: work
                        pattern: first.last
                        verification:
                          mx_valid: true
