  /api/auth/transactions/:
    get:
      tags:
        - 2. Transactions
      summary: Get List of Transactions
      description: Retrieve a log of API usage, including endpoints accessed and credits consumed.
      operationId: getListOfTransactions
      parameters:
        - name: limit
          in: query
          schema:
            type: string
            example: '100'
          description: Limit of transactions in result
        - name: offset
          in: query
          schema:
            type: string
            example: '0'
          description: Offset in list of transactions
      responses:
        '200':
          description: '200'
          headers:
            Allow:
              schema:
                type: string
                example: GET, HEAD, OPTIONS
            Content-Length:
              schema:
                type: string
                example: '25393'
            Cross-Origin-Opener-Policy:
              schema:
                type: string
                example: same-origin
            Date:
              schema:
                type: string
                example: Mon, 02 Dec 2024 20:50:51 GMT
